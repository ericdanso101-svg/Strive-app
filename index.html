<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; color: #1E293B; font-family: 'Quicksand', sans-serif; }
        .dashboard-hero { background: linear-gradient(rgba(59, 130, 246, 0.8), rgba(30, 64, 175, 0.9)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
        .card { background: #F8FAFC; border-radius: 32px; border: 1px solid #F1F5F9; }
        .active-tab { background: #3B82F6; color: white !important; border-radius: 16px; }
        .badge { background: #EFF6FF; border: 1px solid #DBEAFE; border-radius: 20px; padding: 10px; text-align: center; }
        .progress-bar-fill { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="pb-24">

    <header class="dashboard-hero text-white p-10 text-center rounded-b-[4rem] shadow-2xl mb-4">
        <div class="flex justify-between items-center mb-4">
            <i class="fas fa-bell text-white/80" onclick="alert('Notifications Enabled: We\'ll give you a soft nudge at 8am!')"></i>
            <h1 class="text-2xl font-bold italic tracking-tight">Strive Dashboard</h1>
            <i class="fas fa-user-circle text-white/80"></i>
        </div>
        
        <div class="mt-4">
            <div class="flex justify-between text-[10px] font-bold uppercase mb-1 tracking-widest">
                <span>Weekly Goal Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-white/20 h-3 rounded-full overflow-hidden">
                <div id="progress-fill" class="progress-bar-fill bg-white h-full" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 max-w-md space-y-6">

        <nav class="flex justify-around bg-slate-50 p-2 rounded-2xl border border-slate-100">
            <button onclick="switchTab('goals')" id="tab-goals" class="flex-1 py-3 text-[11px] font-bold uppercase active-tab">Dash</button>
            <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-3 text-[11px] font-bold uppercase text-slate-400">Coach</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="flex-1 py-3 text-[11px] font-bold uppercase text-slate-400">Plan</button>
        </nav>

        <div id="view-goals" class="space-y-6">
            <section class="card p-7 text-center">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Muscle Focus</h2>
                <div class="h-48"><canvas id="goalPieChart"></canvas></div>
                <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-slate-50">
                    <div>
                        <div class="text-xl font-bold" id="stat-workouts">0</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">Sessions</div>
                    </div>
                    <div class="border-l border-slate-50">
                        <div class="text-xl font-bold text-blue-500" id="stat-bmi">--</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">BMI</div>
                    </div>
                </div>
            </section>

            <section class="card p-7">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-4">Your Achievements</h2>
                <div class="grid grid-cols-3 gap-3">
                    <div class="badge opacity-50" id="badge-1">
                        <i class="fas fa-fire text-orange-500 text-xl"></i>
                        <p class="text-[8px] font-bold mt-1">STREAK</p>
                    </div>
                    <div class="badge opacity-50" id="badge-2">
                        <i class="fas fa-trophy text-yellow-500 text-xl"></i>
                        <p class="text-[8px] font-bold mt-1">ELITE</p>
                    </div>
                    <div class="badge opacity-50" id="badge-3">
                        <i class="fas fa-medal text-blue-500 text-xl"></i>
                        <p class="text-[8px] font-bold mt-1">LOANER</p>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-daily" class="hidden space-y-6">
            <section class="card p-7 border-t-8 border-blue-400">
                <h2 class="text-sm font-bold text-slate-800 mb-2">Trainer Recommendation</h2>
                <p id="rec-text" class="text-[10px] text-slate-400 font-bold uppercase mb-4 italic">Loading...</p>
                <div id="workout-menu" class="space-y-3">
                    <button id="rec-btn" onclick="generatePersonalized()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl uppercase text-xs">Start Today's Session</button>
                </div>
                <div id="active-workout" class="hidden space-y-4">
                    <div id="exercise-list" class="space-y-3"></div>
                    <button onclick="logSession()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl uppercase text-xs">Log Workout</button>
                </div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-4">
            <section class="card p-7">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-6">Weekly Schedule</h2>
                <div id="weekly-board" class="space-y-3"></div>
            </section>
        </div>

    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let history = JSON.parse(localStorage.getItem('strive_history')) || [];
        let profile = JSON.parse(localStorage.getItem('strive_profile')) || { weight: 170, height: 70, goal: 'Mass Gain' };
        let schedule = JSON.parse(localStorage.getItem('strive_schedule')) || { 'Monday': 'Upper Body', 'Tuesday': 'Rest', 'Wednesday': 'Lower Body', 'Thursday': 'Rest', 'Friday': 'Full Body', 'Saturday': 'Core', 'Sunday': 'Rest' };

        window.onload = function() { 
            initGoalChart(); updateUI(); renderWeeklyBoard(); setDailyRecommendation(); updateGamification();
        };

        function switchTab(tab) {
            ['daily', 'plan', 'goals'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-plan', 'tab-goals'].forEach(b => document.getElementById(b).className = "flex-1 py-3 text-[11px] font-bold uppercase text-slate-400");
            document.getElementById('tab-' + tab).className = "flex-1 py-3 text-[11px] font-bold uppercase active-tab";
        }

        function updateGamification() {
            const count = history.length;
            const progress = Math.min((count % 5) * 20, 100);
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').innerText = progress + '%';
            if (count > 0) document.getElementById('badge-1').classList.remove('opacity-50');
            if (count > 4) document.getElementById('badge-2').classList.remove('opacity-50');
            if (count > 9) document.getElementById('badge-3').classList.remove('opacity-50');
        }

        function updateUI() {
            const bmi = (703 * (profile.weight / (profile.height * profile.height))).toFixed(1);
            document.getElementById('stat-bmi').innerText = isNaN(bmi) ? "--" : bmi;
            document.getElementById('stat-workouts').innerText = history.length;
        }

        function generatePersonalized() {
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            const mode = schedule[days[(new Date().getDay() + 6) % 7]].split(' ')[0].toLowerCase();
            const pool = { upper: ['Pushups', 'Rows'], lower: ['Squats', 'Lunges'], full: ['Burpees', 'Jacks'], core: ['Plank', 'Twists'] };
            document.getElementById('exercise-list').innerHTML = (pool[mode] || pool['full']).map(ex => `
                <div class="p-5 bg-white border border-slate-50 rounded-3xl flex justify-between items-center">
                    <span class="font-bold uppercase text-[11px] text-slate-800">${ex}</span>
                    <i class="fas fa-check text-slate-200"></i>
                </div>`).join('');
        }

        function setDailyRecommendation() {
            const today = days[(new Date().getDay() + 6) % 7];
            document.getElementById('rec-text').innerText = `Plan for Today: ${schedule[today]}`;
        }

        function renderWeeklyBoard() {
            document.getElementById('weekly-board').innerHTML = days.map(day => `
                <div class="flex justify-between p-5 bg-white border border-slate-100 rounded-3xl shadow-sm">
                    <span class="text-[11px] font-bold uppercase text-slate-400">${day}</span>
                    <span class="text-[11px] font-bold uppercase text-slate-800 italic">${schedule[day]}</span>
                </div>`).join('');
        }

        function initGoalChart() {
            const ctx = document.getElementById('goalPieChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Chest', 'Back', 'Legs', 'Abs', 'Arms'],
                    datasets: [{
                        data: [20, 20, 20, 20, 20],
                        backgroundColor: ['#60A5FA', '#3B82F6', '#2563EB', '#1D4ED8', '#DBEAFE'],
                        borderWidth: 0, cutout: '75%'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 9, weight: 'bold' }, color: '#94A3B8', padding: 20 } } } }
            });
        }

        function logSession() { history.push({ date: new Date().toLocaleDateString() }); localStorage.setItem('strive_history', JSON.stringify(history)); location.reload(); }
    </script>
</body>
</html>
