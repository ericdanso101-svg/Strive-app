<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive V11 | Automated Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #F4F7F9; --card-bg: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B;
            --border-color: #E2E8F0; --element-bg: #F8FAFC; --input-bg: #F1F5F9;
        }
        .dark { 
            --bg-main: #0B1120; --card-bg: #1E293B; --text-main: #F8FAFC; --text-muted: #94A3B8;
            --border-color: #334155; --element-bg: #0F172A; --input-bg: #1E293B;
        }
        
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Quicksand', sans-serif; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
        .hero-bg { background: linear-gradient(135deg, #3B82F6, #1D4ED8); }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .nav-container { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 0.5rem; }
        .nav-btn { color: var(--text-muted); font-weight: 700; border-radius: 1rem; transition: all 0.2s; }
        .active-tab { background-color: #3B82F6; color: #FFFFFF !important; }
        .day-row { background-color: var(--element-bg); border: 1px solid var(--border-color); border-radius: 1.25rem; padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; font-weight: 900; cursor: pointer; }
        .day-active { border-color: #3B82F6; background-color: rgba(59, 130, 246, 0.1); color: #3B82F6; }
        .badge-box { background-color: var(--element-bg); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 1rem; text-align: center; opacity: 0.4; filter: grayscale(1); }
        .badge-unlocked { opacity: 1; filter: grayscale(0); border-color: #3B82F6; background-color: rgba(59, 130, 246, 0.05); }
        .weight-input { width: 60px; text-align: center; font-weight: 900; color: #3B82F6; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.5rem; outline: none; transition: all 0.2s; }
        .weight-input:focus { border-color: #3B82F6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="pb-20">

    <header class="hero-bg text-white p-8 pb-12 rounded-b-[3rem] shadow-xl mb-6 relative">
        <div class="absolute top-6 right-6 flex gap-4">
            <i class="fas fa-moon text-xl opacity-80 cursor-pointer" onclick="toggleDarkMode()"></i>
            <i class="fas fa-cog text-xl opacity-80 cursor-pointer" onclick="toggleSettings()"></i>
        </div>
        <h1 class="text-2xl font-black tracking-tight mt-4 mb-2 text-center">Strive V11</h1>
        <div class="max-w-[240px] mx-auto bg-white/20 p-4 rounded-2xl backdrop-blur-sm border border-white/20 mt-6">
            <div class="flex justify-between text-[10px] font-bold uppercase mb-2 tracking-widest">
                <span>Power Goal</span><span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden"><div id="progress-fill" class="bg-white h-full transition-all duration-700" style="width: 0%"></div></div>
        </div>
    </header>

    <main class="container mx-auto px-5 max-w-md space-y-6">

        <nav class="nav-container flex justify-between shadow-sm mb-6">
            <button onclick="switchTab('goals')" id="tab-goals" class="nav-btn flex-1 py-3 text-xs uppercase tracking-wider active-tab">Dash</button>
            <button onclick="switchTab('daily')" id="tab-daily" class="nav-btn flex-1 py-3 text-xs uppercase tracking-wider">Train</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="nav-btn flex-1 py-3 text-xs uppercase tracking-wider">Plan</button>
        </nav>

        <div id="settings-panel" class="hidden space-y-4">
            <section class="card p-7">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-blue-500">Coach Profile</h2>
                    <i class="fas fa-times text-[var(--text-muted)] text-lg cursor-pointer" onclick="toggleSettings()"></i>
                </div>
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <div class="flex-1 p-4 bg-[var(--element-bg)] border border-[var(--border-color)] rounded-2xl">
                            <label class="text-[9px] font-bold uppercase text-[var(--text-muted)] block mb-2">Weight (LBS)</label>
                            <input type="number" id="v-weight" class="w-full bg-transparent font-black text-blue-500 outline-none" onchange="updateProfile()">
                        </div>
                        <div class="flex-1 p-4 bg-[var(--element-bg)] border border-[var(--border-color)] rounded-2xl">
                            <label class="text-[9px] font-bold uppercase text-[var(--text-muted)] block mb-2">Height (IN)</label>
                            <input type="number" id="v-height" class="w-full bg-transparent font-black text-blue-500 outline-none" onchange="updateProfile()">
                        </div>
                    </div>
                    <div class="p-4 bg-[var(--element-bg)] border border-[var(--border-color)] rounded-2xl">
                        <label class="text-[9px] font-bold uppercase text-[var(--text-muted)] block mb-2">Primary Goal</label>
                        <select id="v-goal" class="w-full bg-transparent font-black text-blue-500 outline-none" onchange="updateProfile()">
                            <option value="Build Muscle">Build Muscle (Hypertrophy)</option>
                            <option value="Strength">Max Strength (Heavy, Low Rep)</option>
                            <option value="Fat Loss">Fat Loss (High Volume)</option>
                            <option value="Endurance">Endurance (Stamina)</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                    </div>
                    <div class="p-4 bg-[var(--element-bg)] border border-[var(--border-color)] rounded-2xl">
                        <label class="text-[9px] font-bold uppercase text-[var(--text-muted)] block mb-2">Fitness Level</label>
                        <select id="v-level" class="w-full bg-transparent font-black text-blue-500 outline-none" onchange="updateProfile()">
                            <option value="Beginner">Beginner</option>
                            <option value="Pro">Pro</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>
                    <button onclick="toggleSettings()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl uppercase text-xs">Save Settings</button>
                </div>
            </section>
        </div>

        <div id="view-goals" class="space-y-6 block">
            
            <section class="card p-6 text-center">
                <div class="grid grid-cols-2 gap-4">
                    <div><div class="text-3xl font-black" id="stat-workouts">0</div><div class="text-[9px] font-bold text-[var(--text-muted)] uppercase mt-1">Total Sessions</div></div>
                    <div class="border-l border-[var(--border-color)]"><div class="text-3xl font-black text-blue-500" id="stat-bmi">--</div><div class="text-[9px] font-bold text-[var(--text-muted)] uppercase mt-1">Current BMI</div></div>
                </div>
            </section>

            <section class="card p-6">
                <h2 class="text-[10px] font-bold text-[var(--text-muted)] uppercase tracking-widest text-center mb-4">Muscle Distribution</h2>
                <div class="h-48 mb-2"><canvas id="musclePieChart"></canvas></div>
            </section>

            <section class="card p-6">
                <h2 class="text-[10px] font-bold text-[var(--text-muted)] uppercase tracking-widest text-center mb-4">Strength Progression (LBS)</h2>
                <div class="h-40 mb-2"><canvas id="strengthChart"></canvas></div>
            </section>

            <section class="card p-6">
                <h2 class="text-[10px] font-bold text-[var(--text-muted)] uppercase tracking-widest text-center mb-6">Milestones</h2>
                <div class="grid grid-cols-2 gap-4" id="badge-grid"></div>
            </section>
        </div>

        <div id="view-daily" class="hidden space-y-4">
            <section class="card p-7 border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-sm font-black mb-1">Today's Protocol</h2>
                        <p id="level-indicator" class="text-[10px] text-blue-500 font-bold uppercase"></p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-[var(--element-bg)] text-blue-500 border border-[var(--border-color)] flex items-center justify-center text-xl"><i class="fas fa-bolt"></i></div>
                </div>
                
                <div id="workout-menu"><button onclick="startWorkout()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl uppercase text-xs shadow-lg">Start Session</button></div>
                
                <div id="active-workout" class="hidden space-y-4">
                    <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 p-3 rounded-xl text-center">
                        <p class="text-[9px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">Weights Auto-Filled from Last Session</p>
                    </div>
                    <div id="exercise-list" class="space-y-4"></div>
                    <button onclick="logSession()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-xs mt-4 shadow-lg">Finish & Log Data</button>
                </div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-4">
            <section class="card p-6 pt-8 pb-8">
                <h2 class="text-xs font-bold text-[var(--text-muted)] uppercase tracking-widest text-center mb-6">Weekly Logic</h2>
                <div id="weekly-board"></div>
            </section>
        </div>

    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const types = ['REST', 'UPPER BODY', 'LOWER BODY', 'FULL BODY', 'CORE'];
        
        let history = JSON.parse(localStorage.getItem('strive_history_v11')) || [];
        let profile = JSON.parse(localStorage.getItem('strive_profile_v11')) || { weight: 170, height: 70, level: 'Pro', goal: 'Build Muscle', darkMode: false };
        let schedule = JSON.parse(localStorage.getItem('strive_schedule_v11')) || { 'Monday': 'CORE', 'Tuesday': 'LOWER BODY', 'Wednesday': 'UPPER BODY', 'Thursday': 'REST', 'Friday': 'FULL BODY', 'Saturday': 'CORE', 'Sunday': 'REST' };
        
        let strengthData = JSON.parse(localStorage.getItem('strive_strength_v11')) || { 'Bench Press': [135], 'Squats': [185] };
        let lastWeights = JSON.parse(localStorage.getItem('strive_last_weights_v11')) || { 'Bench Press': 135, 'Squats': 185 };

        const exercises = {
            Beginner: { 'UPPER BODY': ['Wall Pushups', 'Dumbbell Rows'], 'LOWER BODY': ['Chair Squats', 'Dumbbell RDLs'], 'FULL BODY': ['Dumbbell Thrusters'], 'CORE': ['Plank Holds'], 'REST': [] },
            Pro: { 'UPPER BODY': ['Bench Press', 'Barbell Rows'], 'LOWER BODY': ['Squats', 'Lunges'], 'FULL BODY': ['Clean and Press'], 'CORE': ['Weighted Crunches'], 'REST': [] },
            Advanced: { 'UPPER BODY': ['Incline Bench', 'Weighted Pullups'], 'LOWER BODY': ['Front Squats', 'Bulgarian Splits'], 'FULL BODY': ['Snatches'], 'CORE': ['Dragon Flags'], 'REST': [] }
        };

        const badgeData = {
            Beginner: [ {id: 'early', n: 'Early Riser', d: 'Morning Session', i: 'fa-sun'}, {id: 'streak', n: 'Streak Master', d: 'Log 2 Workouts', i: 'fa-fire'} ],
            Pro: [ {id: 'night', n: 'Night Owl', d: 'Late Session', i: 'fa-moon'}, {id: 'warrior', n: 'Weekend Warrior', d: 'Sat/Sun Grind', i: 'fa-shield-alt'} ],
            Advanced: [ {id: 'elite', n: 'The 1%', d: 'Advanced Volume', i: 'fa-crown'}, {id: 'iron', n: 'Iron Will', d: 'No Missed Days', i: 'fa-dumbbell'} ]
        };

        window.onload = function() { 
            if(profile.darkMode) document.body.classList.add('dark');
            updateUI(); renderWeeklyBoard(); initMusclePieChart(); initStrengthChart(); updateBadges();
        };

        function switchTab(tab) {
            ['daily', 'plan', 'goals'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-plan', 'tab-goals'].forEach(b => document.getElementById(b).classList.remove('active-tab'));
            document.getElementById('tab-' + tab).classList.add('active-tab');
            document.getElementById('settings-panel').classList.add('hidden');
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('hidden');
            if(!document.getElementById('settings-panel').classList.contains('hidden')) {
                document.getElementById('view-plan').classList.add('hidden'); document.getElementById('view-daily').classList.add('hidden'); document.getElementById('view-goals').classList.add('hidden');
            } else { switchTab('goals'); }
        }

        function toggleDarkMode() {
            profile.darkMode = !profile.darkMode;
            document.body.classList.toggle('dark');
            localStorage.setItem('strive_profile_v11', JSON.stringify(profile));
            // Reload charts to update styling
            initMusclePieChart();
            initStrengthChart();
        }

        function renderWeeklyBoard() {
            const today = days[(new Date().getDay() + 6) % 7];
            document.getElementById('weekly-board').innerHTML = days.map(day => `
                <div onclick="toggleDay('${day}')" class="day-row ${day === today ? 'day-active' : ''}">
                    <span class="text-xs uppercase">${day}</span><span class="text-[10px] uppercase ${day !== today ? 'opacity-50' : ''}">${schedule[day]}</span>
                </div>`).join('');
        }

        function toggleDay(day) {
            schedule[day] = types[(types.indexOf(schedule[day]) + 1) % types.length];
            localStorage.setItem('strive_schedule_v11', JSON.stringify(schedule));
            renderWeeklyBoard();
        }

        function updateBadges() {
            const grid = document.getElementById('badge-grid');
            grid.innerHTML = badgeData[profile.level].map((b, i) => `
                <div class="badge-box ${history.length > i ? 'badge-unlocked' : ''}">
                    <i class="fas ${b.i} text-2xl mb-3 ${history.length > i ? 'text-blue-500' : 'text-[var(--text-muted)]'}"></i>
                    <p class="text-[10px] font-black uppercase tracking-wide text-[var(--text-main)]">${b.n}</p>
                    <p class="text-[8px] font-bold uppercase text-[var(--text-muted)] mt-1">${b.d}</p>
                </div>`).join('');
        }

        function startWorkout() {
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            const todayMode = schedule[days[(new Date().getDay() + 6) % 7]];
            if(todayMode === 'REST') { document.getElementById('exercise-list').innerHTML = '<p class="text-center text-xs font-bold text-[var(--text-muted)] py-8">Recovery Day. Rest up!</p>'; return; }
            
            const list = exercises[profile.level][todayMode];
            let sets = profile.level === 'Advanced' ? 5 : (profile.level === 'Pro' ? 4 : 3);
            
            let repsTarget = 10;
            if (profile.goal === 'Strength') repsTarget = 5;
            else if (profile.goal === 'Fat Loss') repsTarget = 15;
            else if (profile.goal === 'Endurance') repsTarget = 20;

            document.getElementById('exercise-list').innerHTML = list.map(ex => {
                let pastWeight = lastWeights[ex] || "";
                let suggestedValue = pastWeight;
                
                if (pastWeight !== "" && (profile.goal === 'Build Muscle' || profile.goal === 'Strength')) {
                    suggestedValue = parseInt(pastWeight) + 5;
                }
                
                return `
                <div class="p-5 bg-[var(--element-bg)] border border-[var(--border-color)] rounded-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-black uppercase text-xs">${ex}</span>
                        <span class="text-[9px] font-bold text-white bg-blue-500 px-3 py-1 rounded-full">${sets} Sets</span>
                    </div>
                    <div class="flex gap-2 justify-between">
                        <div class="flex flex-col flex-1">
                            <span class="text-[8px] font-bold text-[var(--text-muted)] uppercase mb-1">Weight (LBS)</span>
                            <input type="number" class="weight-input w-full log-w" data-name="${ex}" value="${suggestedValue}" placeholder="LBS">
                        </div>
                        <div class="flex flex-col flex-1">
                            <span class="text-[8px] font-bold text-[var(--text-muted)] uppercase mb-1">Reps Per Set</span>
                            <input type="number" class="weight-input w-full log-r" value="${repsTarget}" placeholder="Reps">
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function updateProfile() {
            profile.level = document.getElementById('v-level').value;
            profile.goal = document.getElementById('v-goal').value;
            profile.weight = parseFloat(document.getElementById('v-weight').value) || profile.weight;
            profile.height = parseFloat(document.getElementById('v-height').value) || profile.height;
            localStorage.setItem('strive_profile_v11', JSON.stringify(profile));
            updateUI(); updateBadges();
        }

        function updateUI() {
            const bmi = (703 * (profile.weight / (profile.height * profile.height))).toFixed(1);
            document.getElementById('stat-bmi').innerText = isNaN(bmi) ? "--" : bmi;
            document.getElementById('stat-workouts').innerText = history.length;
            document.getElementById('v-level').value = profile.level;
            document.getElementById('v-goal').value = profile.goal;
            document.getElementById('v-weight').value = profile.weight;
            document.getElementById('v-height').value = profile.height;
            document.getElementById('level-indicator').innerText = `${profile.level} • ${profile.goal}`;
            const progress = Math.min((history.length % 5) * 20, 100);
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').innerText = progress + '%';
        }

        // RESTORED PIE CHART
        function initMusclePieChart() {
            const ctx = document.getElementById('musclePieChart').getContext('2d');
            const textColor = profile.darkMode ? '#94A3B8' : '#64748B';
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Chest', 'Biceps', 'Back', 'Legs', 'Triceps', 'Shoulders', 'Calves', 'Abs'],
                    datasets: [{
                        data: [18, 12, 20, 15, 8, 12, 5, 10],
                        backgroundColor: [
                            '#EA4335', // Red (Chest)
                            '#4285F4', // Blue (Biceps)
                            '#1967D2', // Dark Blue (Back)
                            '#8A2BE2', // Purple (Legs)
                            '#009688', // Teal (Triceps)
                            '#F09300', // Orange (Shoulders)
                            '#D81B60', // Pink (Calves)
                            '#34A853'  // Green (Abs)
                        ],
                        borderWidth: 2,
                        borderColor: profile.darkMode ? '#1E293B' : '#FFFFFF'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'right', 
                            labels: { boxWidth: 10, font: { size: 9, family: 'Quicksand', weight: 'bold' }, color: textColor } 
                        } 
                    }
                }
            });
        }

        function initStrengthChart() {
            const ctx = document.getElementById('strengthChart').getContext('2d');
            const benchData = strengthData['Bench Press'] || [0];
            const squatData = strengthData['Squats'] || [0];
            const labels = benchData.map((_, i) => `S${i+1}`);
            const gridColor = profile.darkMode ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
            const textColor = profile.darkMode ? '#94A3B8' : '#64748B';

            new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: labels, 
                    datasets: [
                        { label: 'Bench 1RM', data: benchData, borderColor: '#3B82F6', tension: 0.4, borderWidth: 3 },
                        { label: 'Squat 1RM', data: squatData, borderColor: '#93C5FD', tension: 0.4, borderWidth: 3, borderDash: [5, 5] }
                    ] 
                }, 
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false }, 
                        y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 9, family: 'Quicksand', weight: 'bold' } } } 
                    }
                } 
            });
        }

        function logSession() { 
            const weightInputs = document.querySelectorAll('.log-w');
            const repInputs = document.querySelectorAll('.log-r');
            
            weightInputs.forEach((input, index) => {
                const weight = parseFloat(input.value);
                const reps = parseFloat(repInputs[index].value);
                const name = input.dataset.name;
                
                if (weight > 0 && reps > 0) {
                    lastWeights[name] = weight;
                    if (!strengthData[name]) strengthData[name] = [];
                    const oneRepMax = Math.round(weight * (1 + (reps / 30)));
                    strengthData[name].push(oneRepMax);
                }
            });

            localStorage.setItem('strive_last_weights_v11', JSON.stringify(lastWeights));
            localStorage.setItem('strive_strength_v11', JSON.stringify(strengthData));
            history.push({ date: new Date().toLocaleDateString() }); 
            localStorage.setItem('strive_history_v11', JSON.stringify(history)); 
            location.reload(); 
        }
    </script>
</body>
</html>
