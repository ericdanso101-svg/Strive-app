<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | Smart Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; color: #1E293B; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .hero-bg { background: linear-gradient(rgba(37, 99, 235, 0.6), rgba(30, 58, 138, 0.9)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
        .card { background: #F8FAFC; border-radius: 28px; border: 1px solid #F1F5F9; }
        .active-tab { background: #2563EB; color: white !important; border-radius: 12px; }
        .btn-blue { background-color: #2563EB; color: white; font-weight: 800; border-radius: 16px; }
    </style>
</head>
<body class="pb-24">

    <header class="hero-bg text-white p-12 text-center rounded-b-[4rem] shadow-xl mb-4">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase">Strive</h1>
        <p class="text-[9px] font-bold uppercase tracking-[0.3em] opacity-90 mt-1">Smart Activity Tracking</p>
    </header>

    <main class="container mx-auto px-5 max-w-md space-y-6">

        <nav class="flex justify-around bg-slate-50 p-2 rounded-2xl border border-slate-100 shadow-sm">
            <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-2 text-[10px] font-black uppercase active-tab">Trainer</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="flex-1 py-2 text-[10px] font-black uppercase text-slate-400">Plan</button>
            <button onclick="switchTab('goals')" id="tab-goals" class="flex-1 py-2 text-[10px] font-black uppercase text-slate-400">Goals</button>
        </nav>

        <div id="view-daily" class="space-y-6">
            <section class="card p-6 text-center border-l-4 border-blue-500">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic">Movement Tracking</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl border border-slate-100">
                        <i class="fas fa-shoe-prints text-blue-500 mb-1"></i>
                        <div class="text-xl font-black text-slate-800">8,432</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase">Steps Today</div>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100">
                        <i class="fas fa-fire text-orange-500 mb-1"></i>
                        <div class="text-xl font-black text-slate-800">42</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase">Move Mins</div>
                    </div>
                </div>
            </section>

            <section class="card p-6 text-center">
                <h2 class="text-[10px] font-black text-slate-400 uppercase mb-4 italic">Automated Trainer</h2>
                <div id="workout-menu" class="space-y-3">
                    <button onclick="generateWorkout('upper')" class="w-full bg-white border border-blue-600 text-blue-600 py-5 rounded-2xl font-black uppercase text-xs shadow-sm">Customize Upper Body</button>
                    <button onclick="generateWorkout('lower')" class="w-full bg-white border border-blue-600 text-blue-600 py-5 rounded-2xl font-black uppercase text-xs shadow-sm">Customize Lower Body</button>
                </div>
                <div id="active-workout" class="hidden text-left space-y-4">
                    <div id="exercise-list" class="space-y-3"></div>
                    <button onclick="logSession()" class="w-full btn-blue py-5 uppercase text-xs shadow-lg">Finish Session</button>
                </div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-4">
            <section class="card p-6">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-6">Your Weekly Routine</h2>
                <div id="weekly-board" class="space-y-3"></div>
            </section>
        </div>

        <div id="view-goals" class="hidden space-y-6">
            <section class="card p-6">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-6">Muscle Distribution</h2>
                <div class="h-52"><canvas id="goalPieChart"></canvas></div>
                <div class="grid grid-cols-2 gap-4 mt-6 border-t border-slate-100 pt-6">
                    <div class="text-center">
                        <div class="text-xl font-black" id="stat-workouts">0</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase">Sessions</div>
                    </div>
                    <div class="text-center border-l border-slate-100">
                        <div class="text-xl font-black text-blue-600" id="stat-bmi">--</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase">BMI</div>
                    </div>
                </div>
            </section>

            <section class="card p-6">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-4 italic">Update Stats</h2>
                <div class="flex gap-2 mb-4">
                    <input type="number" id="v-weight" placeholder="LBS" class="flex-1 bg-white border border-slate-200 p-4 rounded-2xl text-center font-bold">
                    <input type="number" id="v-height" placeholder="IN" class="flex-1 bg-white border border-slate-200 p-4 rounded-2xl text-center font-bold">
                </div>
                <button onclick="updateProfile()" class="w-full btn-blue py-4 uppercase text-[10px]">Sync Trainer</button>
            </section>
        </div>

    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let history = JSON.parse(localStorage.getItem('strive_history')) || [];
        let profile = JSON.parse(localStorage.getItem('strive_profile')) || { weight: 170, height: 70, goal: 'Mass Gain' };
        let schedule = { 'Monday': 'Full Body', 'Tuesday': 'Rest', 'Wednesday': 'Upper', 'Thursday': 'Rest', 'Friday': 'Lower', 'Saturday': 'Core', 'Sunday': 'Rest' };
        let goalChart;

        window.onload = function() { initGoalChart(); updateUI(); renderWeeklyBoard(); };

        function switchTab(tab) {
            ['daily', 'plan', 'goals'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-plan', 'tab-goals'].forEach(b => document.getElementById(b).className = "flex-1 py-2 text-[10px] font-black uppercase text-slate-400");
            document.getElementById('tab-' + tab).className = "flex-1 py-2 text-[10px] font-black uppercase active-tab";
        }

        function updateUI() {
            const h = parseFloat(profile.height);
            const w = parseFloat(profile.weight);
            const bmi = (703 * (w / (h * h))).toFixed(1);
            document.getElementById('stat-bmi').innerText = isNaN(bmi) ? "--" : bmi;
            document.getElementById('stat-workouts').innerText = history.length;
            document.getElementById('v-weight').value = profile.weight;
            document.getElementById('v-height').value = profile.height;
        }

        function updateProfile() {
            profile.weight = document.getElementById('v-weight').value || profile.weight;
            profile.height = document.getElementById('v-height').value || profile.height;
            localStorage.setItem('strive_profile', JSON.stringify(profile));
            updateUI();
            alert("Trainer Profile Synced!");
        }

        function renderWeeklyBoard() {
            document.getElementById('weekly-board').innerHTML = days.map(day => `
                <div class="flex justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm">
                    <span class="text-[9px] font-black uppercase text-slate-400">${day}</span>
                    <span class="text-[9px] font-black uppercase text-blue-600">${schedule[day]}</span>
                </div>`).join('');
        }

        function generateWorkout(mode) {
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            const pool = { upper: ['Bench Press', 'Rows', 'Dips'], lower: ['Squats', 'Lunges', 'Deadlifts'] };
            document.getElementById('exercise-list').innerHTML = pool[mode].map(ex => `
                <div class="p-4 bg-white border border-slate-100 rounded-2xl shadow-sm flex justify-between items-center">
                    <div><span class="font-black uppercase text-[10px] text-slate-800">${ex}</span>
                    <p class="text-[8px] font-bold text-blue-600 uppercase mt-1">3 Sets x 12 Reps</p></div>
                    <i class="fas fa-check-circle text-slate-200"></i>
                </div>`).join('');
        }

        function initGoalChart() {
            const ctx = document.getElementById('goalPieChart').getContext('2d');
            goalChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Chest', 'Back', 'Legs', 'Abs', 'Arms'],
                    datasets: [{
                        data: [20, 20, 20, 20, 20],
                        backgroundColor: ['#2563EB', '#3B82F6', '#60A5FA', '#93C5FD', '#BFDBFE'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 8, weight: 'bold' }, color: '#94A3B8' } } } }
            });
        }

        function logSession() {
            history.push({ date: new Date().toLocaleDateString() });
            localStorage.setItem('strive_history', JSON.stringify(history));
            location.reload();
        }
    </script>
</body>
</html>
