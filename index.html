<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | Summit Blue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-family: 'Inter', sans-serif; }
        .hero-bg { background: linear-gradient(rgba(37, 99, 235, 0.8), rgba(37, 99, 235, 0.8)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #E2E8F0; }
        .btn-blue { background-color: #2563EB; color: white; font-weight: 800; border-radius: 16px; transition: all 0.2s; }
        .btn-blue:active { transform: scale(0.95); background-color: #1D4ED8; }
    </style>
</head>
<body class="pb-24">

    <header class="hero-bg text-white p-8 text-center rounded-b-[3rem] shadow-xl mb-6">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase mb-2">Strive Tracker</h1>
        <p class="text-xs font-bold uppercase tracking-widest opacity-90">Summit White & Blue Edition</p>
    </header>

    <main class="container mx-auto px-4 max-w-md space-y-6">

        <nav class="flex justify-around bg-white p-2 rounded-2xl border border-slate-200 shadow-sm">
            <button onclick="switchTab('daily')" id="tab-daily" class="text-[10px] font-black uppercase text-blue-600 border-b-2 border-blue-600 pb-1">Tracker</button>
            <button onclick="switchTab('goals')" id="tab-goals" class="text-[10px] font-black uppercase text-slate-400 pb-1">Goals</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="text-[10px] font-black uppercase text-slate-400 pb-1">Plan</button>
        </nav>

        <div id="view-daily" class="space-y-6">
            <section class="card p-6">
                <h2 class="text-sm font-black text-slate-400 uppercase mb-4 italic text-center">1. Vital Stats</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" id="v-weight" placeholder="LBS" class="bg-slate-50 border border-slate-200 p-4 rounded-2xl text-center text-lg font-bold">
                    <input type="number" id="v-height" placeholder="IN" class="bg-slate-50 border border-slate-200 p-4 rounded-2xl text-center text-lg font-bold">
                </div>
                <select id="v-goal" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-4 text-sm font-black text-blue-600 uppercase text-center appearance-none">
                    <option value="General Wellness">General Wellness</option>
                    <option value="Build Muscle">Build Muscle</option>
                    <option value="Fat Loss">Fat Loss</option>
                    <option value="Mass Gain">Mass Gain</option>
                    <option value="Core Definition">Core Definition</option>
                </select>
                <button onclick="calculateBMI()" class="w-full btn-blue py-4 uppercase text-xs">Sync Stats</button>
                <div id="bmi-display" class="hidden mt-4 p-4 bg-blue-50 rounded-2xl border border-blue-100 text-center">
                    <div class="text-4xl font-black text-blue-600" id="bmi-num">--</div>
                    <div id="bmi-status" class="text-[10px] font-bold uppercase text-blue-500 tracking-widest">--</div>
                </div>
            </section>

            <section class="card p-6 text-center">
                <h2 class="text-sm font-black text-slate-400 uppercase mb-4 italic">2. Active Workout</h2>
                <div id="workout-menu" class="space-y-3">
                    <button onclick="generateWorkout('upper')" class="w-full border-2 border-blue-600 text-blue-600 py-4 rounded-2xl font-black uppercase text-xs italic">Upper Body</button>
                    <button onclick="generateWorkout('lower')" class="w-full border-2 border-blue-600 text-blue-600 py-4 rounded-2xl font-black uppercase text-xs italic">Lower Body</button>
                    <button onclick="generateWorkout('core')" class="w-full border-2 border-blue-600 text-blue-600 py-4 rounded-2xl font-black uppercase text-xs italic">Core Focus</button>
                </div>
                <div id="active-workout" class="hidden text-left space-y-4">
                    <div id="exercise-list" class="space-y-3"></div>
                    <button onclick="logSession()" class="w-full btn-blue py-5 uppercase text-xs">Finish Workout</button>
                </div>
            </section>
        </div>

        <div id="view-goals" class="hidden space-y-6">
            <section class="card p-6 text-center">
                <h2 class="text-sm font-black text-slate-400 uppercase mb-4 italic">Muscle Distribution</h2>
                <div class="flex justify-center mb-4 h-48">
                    <canvas id="goalPieChart"></canvas>
                </div>
                <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                    <div>
                        <div class="bg-green-100 text-green-600 w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-1">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div id="total-workouts" class="text-xl font-black text-slate-800">--</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">Workouts</div>
                    </div>
                    <div>
                        <div class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-1">
                            <i class="fas fa-fire"></i>
                        </div>
                        <div class="text-xl font-black text-slate-800">12,450</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">Est. Calories</div>
                    </div>
                </div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-6">
            <section class="card p-6">
                <h2 class="text-sm font-black text-slate-400 uppercase mb-4 italic text-center">Weekly Routine</h2>
                <div id="weekly-board" class="space-y-2"></div>
            </section>
        </div>

    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let history = JSON.parse(localStorage.getItem('strive_history')) || [];
        let schedule = JSON.parse(localStorage.getItem('strive_schedule')) || { 'Monday': 'Full', 'Tuesday': 'No Workout', 'Wednesday': 'Full', 'Thursday': 'No Workout', 'Friday': 'Full', 'Saturday': 'Short', 'Sunday': 'No Workout' };
        let goalChart;

        window.onload = function() { renderWeeklyBoard(); initGoalChart(); updateStats(); };

        function switchTab(tab) {
            ['daily', 'goals', 'plan'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-goals', 'tab-plan'].forEach(btn => document.getElementById(btn).className = "text-[10px] font-black uppercase text-slate-400 pb-1");
            document.getElementById('tab-' + tab).className = "text-[10px] font-black uppercase text-blue-600 border-b-2 border-blue-600 pb-1";
            if(tab === 'goals') updateStats();
        }

        function calculateBMI() {
            const w = parseFloat(document.getElementById('v-weight').value);
            const h = parseFloat(document.getElementById('v-height').value);
            if (!w || !h) return alert("Enter stats!");
            const bmi = (703 * (w / (h * h))).toFixed(1);
            document.getElementById('bmi-display').classList.remove('hidden');
            document.getElementById('bmi-num').innerText = bmi;
            const status = document.getElementById('bmi-status');
            status.innerText = bmi < 18.5 ? "Underweight" : (bmi <= 24.9 ? "Healthy Weight" : "Overweight");
            localStorage.setItem('strive_profile', JSON.stringify({weight:w, height:h, goal: document.getElementById('v-goal').value}));
        }

        function generateWorkout(mode) {
            const goal = document.getElementById('v-goal').value;
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            
            let sets = 3; let reps = goal === "Mass Gain" ? "6-8" : (goal === "Core Definition" ? "20+" : "12");
            const pool = { upper: ['Pushups', 'Rows', 'Bench Press'], lower: ['Squats', 'Lunges', 'Deadlifts'], core: ['Plank', 'Twists', 'Leg Raises'] };
            
            document.getElementById('exercise-list').innerHTML = pool[mode].map(ex => `
                <div class="p-4 border border-slate-100 rounded-2xl bg-slate-50 flex justify-between items-center">
                    <div><span class="font-black uppercase text-[10px] text-slate-800">${ex}</span>
                    <p class="text-[9px] font-bold text-blue-600 uppercase mt-1">${sets} Sets x ${reps} Reps</p></div>
                    <i class="fas fa-chevron-right text-slate-300"></i>
                </div>`).join('');
        }

        function initGoalChart() {
            const ctx = document.getElementById('goalPieChart').getContext('2d');
            goalChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Chest', 'Back', 'Legs', 'Abs', 'Arms'],
                    datasets: [{
                        data: [20, 15, 30, 25, 10],
                        backgroundColor: ['#ef4444', '#3b82f6', '#8b5cf6', '#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 8, weight: 'bold' }, padding: 10 } } } }
            });
        }

        function logSession() {
            history.push({ date: new Date().toLocaleDateString() });
            localStorage.setItem('strive_history', JSON.stringify(history));
            alert("Workout Logged!");
            location.reload();
        }

        function updateStats() { document.getElementById('total-workouts').innerText = history.length; }
        function renderWeeklyBoard() { document.getElementById('weekly-board').innerHTML = days.map(day => `<div class="flex justify-between p-4 border border-slate-100 rounded-2xl text-[10px] font-black uppercase"><span class="text-slate-400">${day}</span><span class="text-slate-800">${schedule[day]}</span></div>`).join(''); }
        function resetMenu() { document.getElementById('workout-menu').classList.remove('hidden'); document.getElementById('active-workout').classList.add('hidden'); }
    </script>
</body>
</html>
