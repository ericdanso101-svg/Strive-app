<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | Personal Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFFFF; color: #1E293B; font-family: 'Quicksand', sans-serif; }
        .hero-bg { background: linear-gradient(rgba(59, 130, 246, 0.5), rgba(30, 64, 175, 0.7)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
        .card { background: #F8FAFC; border-radius: 32px; border: 1px solid #F1F5F9; transition: all 0.2s; }
        .active-tab { background: #3B82F6; color: white !important; border-radius: 16px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-coach { background: #3B82F6; color: white; font-weight: 700; border-radius: 20px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
        .day-chip { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .day-active { border-color: #3B82F6; background: #EFF6FF; }
    </style>
</head>
<body class="pb-24">

    <header class="hero-bg text-white p-14 text-center rounded-b-[5rem] shadow-lg mb-4">
        <h1 class="text-3xl font-bold tracking-tight mb-1">Strive Coach</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-90">Personalized for your progress</p>
    </header>

    <main class="container mx-auto px-6 max-w-md space-y-6">

        <nav class="flex justify-around bg-slate-50 p-2 rounded-2xl border border-slate-100">
            <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-3 text-[11px] font-bold uppercase active-tab">Coach</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="flex-1 py-3 text-[11px] font-bold uppercase text-slate-400">Plan</button>
            <button onclick="switchTab('goals')" id="tab-goals" class="flex-1 py-3 text-[11px] font-bold uppercase text-slate-400">Goals</button>
        </nav>

        <div id="view-daily" class="space-y-6">
            <section class="card p-7 border-t-8 border-blue-400">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-blue-100 p-3 rounded-2xl"><i class="fas fa-magic text-blue-500"></i></div>
                    <div>
                        <h2 class="text-sm font-bold text-slate-800">Daily Recommendation</h2>
                        <p id="rec-text" class="text-[10px] text-slate-400 font-bold uppercase">Analyzing your activity...</p>
                    </div>
                </div>
                <div id="workout-menu" class="space-y-3">
                    <button id="rec-btn" onclick="generatePersonalized()" class="w-full btn-coach py-5 uppercase text-xs">Start Recommended Session</button>
                    <button onclick="toggleManual()" class="w-full text-[10px] font-bold text-slate-400 uppercase">Or Choose Manually</button>
                    <div id="manual-menu" class="hidden grid grid-cols-2 gap-2 pt-2">
                        <button onclick="generateWorkout('upper')" class="bg-white border border-slate-200 py-3 rounded-xl text-[10px] font-bold uppercase">Upper</button>
                        <button onclick="generateWorkout('lower')" class="bg-white border border-slate-200 py-3 rounded-xl text-[10px] font-bold uppercase">Lower</button>
                    </div>
                </div>
                <div id="active-workout" class="hidden space-y-4">
                    <div id="exercise-list" class="space-y-3"></div>
                    <button onclick="logSession()" class="w-full btn-coach py-5 uppercase text-xs">Session Complete</button>
                </div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-4">
            <section class="card p-7">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-2">Weekly Schedule</h2>
                <p class="text-[9px] text-center text-slate-400 mb-6 italic">Tap any day to change your workout type</p>
                <div id="weekly-board" class="space-y-3"></div>
            </section>
        </div>

        <div id="view-goals" class="hidden space-y-6 text-center">
            <section class="card p-7">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Muscle Balance</h2>
                <div class="h-52"><canvas id="goalPieChart"></canvas></div>
                <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-slate-50">
                    <div>
                        <div class="text-xl font-bold" id="stat-workouts">0</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">Sessions</div>
                    </div>
                    <div class="border-l border-slate-50">
                        <div class="text-xl font-bold text-blue-500" id="stat-bmi">--</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">BMI</div>
                    </div>
                </div>
            </section>
            
            <section class="card p-7">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Sync Your Body Stats</h2>
                <div class="flex gap-2">
                    <input type="number" id="v-weight" placeholder="LBS" class="flex-1 bg-white border border-slate-100 p-4 rounded-2xl text-center font-bold">
                    <input type="number" id="v-height" placeholder="IN" class="flex-1 bg-white border border-slate-100 p-4 rounded-2xl text-center font-bold">
                </div>
                <button onclick="updateProfile()" class="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl uppercase text-[10px] mt-3">Update Profile</button>
            </section>
        </div>

    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const types = ['Rest', 'Upper Body', 'Lower Body', 'Full Body', 'Core'];
        let history = JSON.parse(localStorage.getItem('strive_history')) || [];
        let profile = JSON.parse(localStorage.getItem('strive_profile')) || { weight: 170, height: 70, goal: 'Mass Gain' };
        let schedule = JSON.parse(localStorage.getItem('strive_schedule')) || { 'Monday': 'Upper Body', 'Tuesday': 'Rest', 'Wednesday': 'Lower Body', 'Thursday': 'Rest', 'Friday': 'Full Body', 'Saturday': 'Core', 'Sunday': 'Rest' };

        window.onload = function() { 
            initGoalChart(); 
            updateUI(); 
            renderWeeklyBoard(); 
            setDailyRecommendation();
        };

        function switchTab(tab) {
            ['daily', 'plan', 'goals'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-plan', 'tab-goals'].forEach(b => document.getElementById(b).className = "flex-1 py-3 text-[11px] font-bold uppercase text-slate-400");
            document.getElementById('tab-' + tab).className = "flex-1 py-3 text-[11px] font-bold uppercase active-tab";
        }

        function setDailyRecommendation() {
            const today = days[(new Date().getDay() + 6) % 7];
            const plan = schedule[today];
            const text = document.getElementById('rec-text');
            const btn = document.getElementById('rec-btn');
            
            if (plan === 'Rest') {
                text.innerText = "Today is a Rest Day. Recover well!";
                btn.innerText = "Resting Today";
                btn.disabled = true;
                btn.className = "w-full bg-slate-100 text-slate-400 py-5 rounded-2xl font-bold uppercase text-xs cursor-not-allowed";
            } else {
                text.innerText = `Coach recommends: ${plan} Session`;
                btn.innerText = `Start ${plan} Workout`;
            }
        }

        function toggleDay(day) {
            let current = schedule[day];
            let nextIndex = (types.indexOf(current) + 1) % types.length;
            schedule[day] = types[nextIndex];
            localStorage.setItem('strive_schedule', JSON.stringify(schedule));
            renderWeeklyBoard();
            setDailyRecommendation();
        }

        function renderWeeklyBoard() {
            const today = days[(new Date().getDay() + 6) % 7];
            document.getElementById('weekly-board').innerHTML = days.map(day => `
                <div onclick="toggleDay('${day}')" class="day-chip flex justify-between p-5 bg-white border border-slate-100 rounded-3xl ${day === today ? 'day-active' : ''}">
                    <span class="text-[11px] font-bold uppercase ${day === today ? 'text-blue-600' : 'text-slate-400'}">${day}</span>
                    <span class="text-[11px] font-bold uppercase text-slate-800 italic">${schedule[day]}</span>
                </div>`).join('');
        }

        function updateUI() {
            const h = parseFloat(profile.height);
            const w = parseFloat(profile.weight);
            const bmi = (703 * (w / (h * h))).toFixed(1);
            document.getElementById('stat-bmi').innerText = isNaN(bmi) ? "--" : bmi;
            document.getElementById('stat-workouts').innerText = history.length;
            document.getElementById('v-weight').value = profile.weight;
            document.getElementById('v-height').value = profile.height;
        }

        function updateProfile() {
            profile.weight = document.getElementById('v-weight').value || profile.weight;
            profile.height = document.getElementById('v-height').value || profile.height;
            localStorage.setItem('strive_profile', JSON.stringify(profile));
            updateUI();
            alert("Coach Profile Synced!");
        }

        function generatePersonalized() {
            const today = days[(new Date().getDay() + 6) % 7];
            generateWorkout(schedule[today].split(' ')[0].toLowerCase());
        }

        function generateWorkout(mode) {
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            const pool = { upper: ['Bench Press', 'Rows', 'Shoulder Press'], lower: ['Squats', 'Lunges', 'Step-ups'], full: ['Burpees', 'Thrusters', 'Mountain Climbers'], core: ['Plank', 'Twists', 'Crunches'] };
            const sets = profile.goal === "Mass Gain" ? 4 : 3;
            const reps = profile.goal === "Mass Gain" ? "6-8" : "12-15";
            
            document.getElementById('exercise-list').innerHTML = (pool[mode] || pool['full']).map(ex => `
                <div class="p-5 bg-white border border-slate-50 rounded-3xl flex justify-between items-center shadow-sm">
                    <div>
                        <span class="font-bold uppercase text-[11px] text-slate-800">${ex}</span>
                        <div class="text-[9px] font-bold text-blue-500 uppercase mt-1">${sets} Sets x ${reps} Reps</div>
                    </div>
                    <div class="w-8 h-8 rounded-full border-2 border-slate-100 flex items-center justify-center">
                        <i class="fas fa-check text-slate-100"></i>
                    </div>
                </div>`).join('');
        }

        function initGoalChart() {
            const ctx = document.getElementById('goalPieChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Chest', 'Back', 'Legs', 'Abs', 'Arms'],
                    datasets: [{
                        data: [20, 20, 20, 20, 20],
                        backgroundColor: ['#60A5FA', '#3B82F6', '#2563EB', '#1E40AF', '#DBEAFE'],
                        borderWidth: 0,
                        cutout: '75%'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Quicksand', size: 9, weight: 'bold' }, color: '#94A3B8', padding: 20 } } } }
            });
        }

        function toggleManual() { document.getElementById('manual-menu').classList.toggle('hidden'); }
        function logSession() { history.push({ date: new Date().toLocaleDateString() }); localStorage.setItem('strive_history', JSON.stringify(history)); location.reload(); }
    </script>
</body>
</html>
