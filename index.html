<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | V5 Strict Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #1E293B; --card: #F8FAFC; --border: #F1F5F9; --nav: #F1F5F9; --btn: #E2E8F0; }
        .dark { --bg: #1A1C1E; --text: #F8FAFC; --card: #2D3135; --border: #3D4145; --nav: #2D3135; --btn: #3D4145; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        .hero-bg { background: linear-gradient(rgba(59, 130, 246, 0.85), rgba(30, 64, 175, 0.95)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
        .card { background: var(--card); border-radius: 32px; border: 1px solid var(--border); }
        .nav-container { background: var(--nav); border-radius: 20px; }
        .active-tab { background: #3B82F6; color: white !important; border-radius: 16px; }
        .badge-box { background: var(--btn); border-radius: 24px; transition: all 0.3s; opacity: 0.3; filter: grayscale(1); }
        .badge-active { opacity: 1 !important; filter: grayscale(0) !important; border: 2px solid #3B82F6; }
        .tutorial-box { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3B82F6; padding: 10px; font-size: 10px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body class="pb-20">

    <header class="hero-bg text-white p-8 pb-12 text-center rounded-b-[4rem] shadow-2xl mb-4">
        <div class="flex justify-between items-center mb-6">
            <i class="fas fa-bell opacity-70" onclick="alert('Notification: Check your custom alert time in settings!')"></i>
            <h1 class="text-xl font-bold italic tracking-tighter">STRIVE V5</h1>
            <i class="fas fa-cog opacity-70" onclick="toggleSettings()"></i>
        </div>
        <div class="w-20 h-20 rounded-full border-4 border-white mx-auto mb-4 flex items-center justify-center bg-blue-100/20" id="main-avatar">
            <i class="fas fa-user-ninja text-3xl" id="avatar-icon"></i>
        </div>
        <div class="max-w-[200px] mx-auto bg-white/10 p-4 rounded-3xl backdrop-blur-md border border-white/10">
            <div class="flex justify-between text-[8px] font-bold uppercase mb-1">
                <span>Power Goal</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden">
                <div id="progress-fill" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-5 max-w-md space-y-4">

        <nav class="nav-container p-1.5 flex justify-around shadow-sm">
            <button onclick="switchTab('goals')" id="tab-goals" class="flex-1 py-3 text-[10px] font-bold uppercase active-tab">Dash</button>
            <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-3 text-[10px] font-bold uppercase text-slate-400">Train</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="flex-1 py-3 text-[10px] font-bold uppercase text-slate-400">Plan</button>
        </nav>

        <div id="settings-panel" class="hidden space-y-4">
            <section class="card p-7 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-blue-500">System Settings</h2>
                    <i class="fas fa-times opacity-50" onclick="toggleSettings()"></i>
                </div>
                <div class="space-y-5">
                    <div class="flex justify-between items-center p-4 bg-black/5 dark:bg-white/5 rounded-2xl">
                        <span class="text-[10px] font-bold uppercase">Appearance</span>
                        <button onclick="toggleDarkMode()" class="bg-blue-600 text-white text-[9px] px-4 py-2 rounded-xl font-bold uppercase">Toggle Mode</button>
                    </div>
                    <div class="p-4 bg-black/5 dark:bg-white/5 rounded-2xl">
                        <p class="text-[9px] font-bold uppercase opacity-50 mb-3 text-center">Avatar Color</p>
                        <div class="flex justify-center gap-4">
                            <div class="w-6 h-6 bg-blue-500 rounded-full" onclick="changeAvatar('#3B82F6', 'fa-user-ninja')"></div>
                            <div class="w-6 h-6 bg-orange-500 rounded-full" onclick="changeAvatar('#F97316', 'fa-user-astronaut')"></div>
                            <div class="w-6 h-6 bg-purple-500 rounded-full" onclick="changeAvatar('#A855F7', 'fa-user-secret')"></div>
                        </div>
                    </div>
                    <select id="v-level" class="w-full bg-transparent border border-blue-500/20 p-4 rounded-2xl text-[10px] font-bold uppercase text-blue-500" onchange="updateProfile()">
                        <option value="Beginner">Beginner</option>
                        <option value="Pro">Pro</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                    <button onclick="toggleSettings()" class="w-full bg-blue-600 text-white p-4 rounded-2xl text-[10px] font-bold uppercase">Save & Close</button>
                </div>
            </section>
        </div>

        <div id="view-goals" class="space-y-4">
            <section class="card p-7 text-center">
                <div class="h-44 mb-6"><canvas id="goalPieChart"></canvas></div>
                <div class="grid grid-cols-2 gap-4 pt-6 border-t border-black/5 dark:border-white/5">
                    <div><div class="text-2xl font-bold" id="stat-workouts">0</div><div class="text-[9px] font-bold opacity-50 uppercase">Workouts</div></div>
                    <div class="border-l border-black/5 dark:border-white/5 pl-4"><div class="text-2xl font-bold text-blue-500" id="stat-bmi">--</div><div class="text-[9px] font-bold opacity-50 uppercase">BMI</div></div>
                </div>
            </section>

            <section class="card p-7">
                <h2 class="text-[10px] font-bold opacity-50 uppercase tracking-widest text-center mb-6">Milestone Badges</h2>
                <div class="grid grid-cols-2 gap-3" id="badge-grid">
                    </div>
            </section>
        </div>

        <div id="view-daily" class="hidden space-y-4">
            <section class="card p-7 border-t-4 border-blue-500">
                <h2 id="rec-text" class="text-sm font-bold mb-1 italic">Personalized Logic</h2>
                <p id="level-indicator" class="text-[9px] text-blue-500 font-bold uppercase mb-4"></p>
                <div id="workout-menu"><button onclick="generateIntelligentWorkout()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl uppercase text-xs shadow-lg">Start Session</button></div>
                <div id="active-workout" class="hidden space-y-4"><div id="exercise-list" class="space-y-3"></div><button onclick="logSession()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl uppercase text-xs">Finish Workout</button></div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-4">
            <section class="card p-7">
                <h2 class="text-[10px] font-bold opacity-50 uppercase tracking-widest text-center mb-6">Weekly Schedule</h2>
                <div id="weekly-board" class="space-y-2"></div>
            </section>
        </div>

    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const types = ['Rest', 'Upper Body', 'Lower Body', 'Full Body', 'Core'];
        let history = JSON.parse(localStorage.getItem('strive_history')) || [];
        let profile = JSON.parse(localStorage.getItem('strive_profile')) || { weight: 170, height: 70, level: 'Beginner', darkMode: false, avatarColor: '#3B82F6', avatarIcon: 'fa-user-ninja' };
        let schedule = JSON.parse(localStorage.getItem('strive_schedule')) || { 'Monday': 'Upper Body', 'Tuesday': 'Rest', 'Wednesday': 'Lower Body', 'Thursday': 'Rest', 'Friday': 'Full Body', 'Saturday': 'Core', 'Sunday': 'Rest' };

        const exercises = {
            Beginner: { upper: [{n:'Wall Pushups', s:'Arms on wall, slow reps.'}], lower: [{n:'Chair Squats', s:'Sit and stand from chair.'}], full: [{n:'Step Jacks', s:'Step side to side with arm swings.'}], core: [{n:'Seated Twists', s:'Rotate torso while sitting.'}] },
            Pro: { upper: [{n:'Standard Pushups', s:'Core tight, chest to floor.'}], lower: [{n:'Body Squats', s:'Hips back, thighs parallel.'}], full: [{n:'Mountain Climbers', s:'Plank position, knees to chest.'}], core: [{n:'Plank', s:'Hold straight body line.'}] },
            Advanced: { upper: [{n:'Diamond Pushups', s:'Hands touch, lower chest.'}], lower: [{n:'Jump Squats', s:'Explosive power jump.'}], full: [{n:'Burpees', s:'Full deck burpee movement.'}], core: [{n:'Hanging Leg Raises', s:'Lift legs to bar.'}] }
        };

        const badgeData = {
            Beginner: [ {id: 'early', n: 'Early Riser', desc: '4AM-7AM Session', icon: 'fa-sun'}, {id: 'streak', n: 'Fresh Start', desc: 'Log 1 Session', icon: 'fa-seedling'} ],
            Pro: [ {id: 'night', n: 'Night Owl', desc: '10PM-4AM Session', icon: 'fa-moon'}, {id: 'streak', n: 'Streak Master', desc: '3 Day Streak', icon: 'fa-fire'} ],
            Advanced: [ {id: 'warrior', n: 'Weekend Warrior', desc: 'Sat+Sun Grind', icon: 'fa-shield-alt'}, {id: 'elite', n: 'The 1%', desc: '10 Sessions Logged', icon: 'fa-crown'} ]
        };

        window.onload = function() { 
            if(profile.darkMode) document.body.classList.add('dark');
            updateUI(); renderWeeklyBoard(); initGoalChart(); updateBadges();
        };

        function switchTab(tab) {
            ['daily', 'plan', 'goals'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-plan', 'tab-goals'].forEach(b => document.getElementById(b).className = "flex-1 py-3 text-[10px] font-bold uppercase text-slate-400");
            document.getElementById('tab-' + tab).className = "flex-1 py-3 text-[10px] font-bold uppercase active-tab";
            document.getElementById('settings-panel').classList.add('hidden');
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('hidden');
            document.getElementById('view-goals').classList.toggle('hidden');
        }

        function toggleDarkMode() {
            profile.darkMode = !profile.darkMode;
            document.body.classList.toggle('dark');
            localStorage.setItem('strive_profile', JSON.stringify(profile));
        }

        function changeAvatar(color, icon) {
            profile.avatarColor = color; profile.avatarIcon = icon;
            document.getElementById('main-avatar').style.backgroundColor = color;
            document.getElementById('avatar-icon').className = `fas ${icon} text-3xl text-white`;
            localStorage.setItem('strive_profile', JSON.stringify(profile));
        }

        function updateBadges() {
            const grid = document.getElementById('badge-grid');
            const levelBadges = badgeData[profile.level];
            grid.innerHTML = levelBadges.map(b => `
                <div class="badge-box p-4 text-center ${isBadgeUnlocked(b.id) ? 'badge-active' : ''}">
                    <i class="fas ${b.icon} text-xl mb-2 text-blue-500"></i>
                    <p class="text-[9px] font-bold uppercase">${b.n}</p>
                    <p class="text-[7px] opacity-50">${b.desc}</p>
                </div>`).join('');
        }

        function isBadgeUnlocked(id) {
            if(id === 'streak' && history.length >= 1) return true;
            if(id === 'elite' && history.length >= 10) return true;
            return false; // Time-based badges would check session timestamps
        }

        function generateIntelligentWorkout() {
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            const mode = schedule[days[(new Date().getDay() + 6) % 7]].split(' ')[0].toLowerCase();
            const list = exercises[profile.level][mode] || exercises[profile.level]['upper'];
            let sets = profile.level === 'Advanced' ? 5 : (profile.level === 'Pro' ? 4 : 3);
            document.getElementById('exercise-list').innerHTML = list.map(ex => `
                <div class="p-5 bg-white/5 border border-black/5 rounded-2xl">
                    <div class="flex justify-between items-center"><span class="font-bold uppercase text-[10px]">${ex.n}</span><span class="text-[9px] font-bold text-blue-500">${sets} Sets</span></div>
                    ${profile.level === 'Beginner' ? `<div class="tutorial-box"><i class="fas fa-info-circle mr-1"></i> ${ex.s}</div>` : ''}
                </div>`).join('');
        }

        function renderWeeklyBoard() {
            const today = days[(new Date().getDay() + 6) % 7];
            document.getElementById('weekly-board').innerHTML = days.map(day => `
                <div onclick="toggleDay('${day}')" class="flex justify-between p-5 bg-white/5 border border-black/5 rounded-2xl ${day === today ? 'border-blue-500 bg-blue-50/50' : ''}">
                    <span class="text-[10px] font-bold uppercase ${day === today ? 'text-blue-600' : 'opacity-40'}">${day}</span>
                    <span class="text-[10px] font-bold uppercase italic">${schedule[day]}</span>
                </div>`).join('');
        }

        function toggleDay(day) {
            schedule[day] = types[(types.indexOf(schedule[day]) + 1) % types.length];
            localStorage.setItem('strive_schedule', JSON.stringify(schedule));
            renderWeeklyBoard();
        }

        function updateUI() {
            const bmi = (703 * (profile.weight / (profile.height * profile.height))).toFixed(1);
            document.getElementById('stat-bmi').innerText = isNaN(bmi) ? "--" : bmi;
            document.getElementById('stat-workouts').innerText = history.length;
            document.getElementById('v-level').value = profile.level;
            document.getElementById('level-indicator').innerText = profile.level + ' Protocol';
            const progress = Math.min((history.length % 5) * 20, 100);
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').innerText = progress + '%';
            changeAvatar(profile.avatarColor, profile.avatarIcon);
        }

        function updateProfile() {
            profile.level = document.getElementById('v-level').value;
            localStorage.setItem('strive_profile', JSON.stringify(profile));
            updateUI(); updateBadges();
        }

        function initGoalChart() {
            const ctx = document.getElementById('goalPieChart').getContext('2d');
            new Chart(ctx, { type: 'doughnut', data: { labels: ['Chest', 'Back', 'Legs', 'Abs', 'Arms'], datasets: [{ data: [20, 20, 20, 20, 20], backgroundColor: ['#60A5FA', '#3B82F6', '#2563EB', '#1D4ED8', '#DBEAFE'], borderWidth: 0, cutout: '80%' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 9, weight: 'bold' }, color: '#94A3B8', padding: 15 } } } } });
        }

        function logSession() { history.push({ date: new Date().toLocaleDateString(), time: new Date().getHours() }); localStorage.setItem('strive_history', JSON.stringify(history)); location.reload(); }
    </script>
</body>
</html>
