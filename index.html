<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strive | Smart Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #1E293B; --card: #F8FAFC; --border: #F1F5F9; }
        .dark { --bg: #0F172A; --text: #F8FAFC; --card: #1E293B; --border: #334155; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; transition: all 0.3s ease; }
        .hero-bg { background: linear-gradient(rgba(59, 130, 246, 0.8), rgba(30, 64, 175, 0.9)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
        .card { background: var(--card); border-radius: 28px; border: 1px solid var(--border); }
        .active-tab { background: #3B82F6; color: white !important; border-radius: 14px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
        .tutorial-box { background: rgba(59, 130, 246, 0.1); border: 1px dashed #3B82F6; border-radius: 16px; padding: 12px; margin-top: 8px; font-size: 10px; color: #3B82F6; }
        .avatar-circle { width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: all 0.3s; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="pb-20">

    <header class="hero-bg text-white p-6 pb-10 text-center rounded-b-[3rem] shadow-xl mb-4">
        <div class="flex justify-between items-center mb-4">
            <i class="fas fa-bell text-white/70" onclick="alert('Daily nudge set for your preferred time!')"></i>
            <h1 class="text-xl font-bold italic tracking-tight">Strive V4</h1>
            <i class="fas fa-cog text-white/70" onclick="toggleSettings()"></i>
        </div>
        <div class="avatar-circle mb-3 shadow-lg" id="main-avatar">
            <i class="fas fa-user-ninja text-3xl" id="avatar-icon"></i>
        </div>
        <div class="max-w-[160px] mx-auto bg-white/10 p-3 rounded-2xl backdrop-blur-sm border border-white/10">
            <div class="flex justify-between text-[8px] font-bold uppercase mb-1">
                <span>Power Goal</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-white/20 h-1.5 rounded-full overflow-hidden">
                <div id="progress-fill" class="bg-white h-full transition-all duration-1000" style="width: 5%"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-md space-y-4">

        <nav class="flex justify-around bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
            <button onclick="switchTab('goals')" id="tab-goals" class="flex-1 py-2.5 text-[10px] font-bold uppercase active-tab">Dash</button>
            <button onclick="switchTab('daily')" id="tab-daily" class="flex-1 py-2.5 text-[10px] font-bold uppercase text-slate-400">Train</button>
            <button onclick="switchTab('plan')" id="tab-plan" class="flex-1 py-2.5 text-[10px] font-bold uppercase text-slate-400">Plan</button>
        </nav>

        <div id="settings-panel" class="hidden space-y-4 animate-fade-in">
            <section class="card p-6 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-blue-500">App Customization</h2>
                    <i class="fas fa-times text-slate-400" onclick="toggleSettings()"></i>
                </div>
                
                <div class="flex justify-between items-center mb-6 p-4 bg-white/5 rounded-2xl border border-slate-200/20">
                    <span class="text-[10px] font-bold uppercase">Appearance</span>
                    <button onclick="toggleDarkMode()" class="text-[10px] bg-blue-600 text-white px-4 py-2 rounded-xl font-bold uppercase">Toggle Dark/Light</button>
                </div>

                <div class="text-center mb-6">
                    <p class="text-[9px] font-bold uppercase text-slate-400 mb-3 tracking-widest">Select Persona</p>
                    <div class="flex justify-center gap-3 mb-4">
                        <div class="color-dot bg-blue-500" onclick="changeAvatar('#3B82F6', 'fa-user-ninja')"></div>
                        <div class="color-dot bg-orange-500" onclick="changeAvatar('#F97316', 'fa-user-astronaut')"></div>
                        <div class="color-dot bg-emerald-500" onclick="changeAvatar('#10B981', 'fa-user-tie')"></div>
                        <div class="color-dot bg-purple-500" onclick="changeAvatar('#A855F7', 'fa-user-secret')"></div>
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t border-slate-200/20">
                    <select id="v-level" class="w-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-4 rounded-2xl text-[11px] font-bold uppercase text-blue-600" onchange="updateProfile()">
                        <option value="Beginner">Beginner Level</option>
                        <option value="Pro">Pro Level</option>
                        <option value="Advanced">Advanced Level</option>
                    </select>
                    <button onclick="toggleSettings()" class="w-full bg-slate-200 dark:bg-slate-700 p-4 rounded-2xl text-[10px] font-bold uppercase">Close & Save</button>
                </div>
            </section>
        </div>

        <div id="view-goals" class="space-y-4">
            <section class="card p-6 text-center">
                <div class="grid grid-cols-2 gap-4">
                    <div><div class="text-2xl font-bold" id="stat-workouts">0</div><div class="text-[9px] font-bold text-slate-400 uppercase">Sessions</div></div>
                    <div class="border-l border-slate-200 pl-4"><div class="text-2xl font-bold text-blue-500" id="stat-bmi">--</div><div class="text-[9px] font-bold text-slate-400 uppercase">BMI</div></div>
                </div>
            </section>
        </div>

        <div id="view-daily" class="hidden space-y-4">
            <section class="card p-6 border-t-4 border-blue-500">
                <h2 id="rec-text" class="text-sm font-bold mb-1">Tailored Protocol</h2>
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-4 italic">Instructional mode active for Beginners</p>
                <div id="workout-menu"><button onclick="generateIntelligentWorkout()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl uppercase text-xs shadow-lg">Begin Session</button></div>
                <div id="active-workout" class="hidden space-y-3"><div id="exercise-list" class="space-y-3"></div><button onclick="logSession()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl uppercase text-xs">Finish Workout</button></div>
            </section>
        </div>

        <div id="view-plan" class="hidden space-y-3">
            <section class="card p-6"><h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-4">Weekly Logic</h2><div id="weekly-board" class="space-y-2"></div></section>
        </div>
    </main>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const types = ['Rest', 'Upper Body', 'Lower Body', 'Full Body', 'Core'];
        let history = JSON.parse(localStorage.getItem('strive_history')) || [];
        let profile = JSON.parse(localStorage.getItem('strive_profile')) || { weight: 170, height: 70, level: 'Beginner', darkMode: false, avatarColor: '#3B82F6', avatarIcon: 'fa-user-ninja' };
        let schedule = JSON.parse(localStorage.getItem('strive_schedule')) || { 'Monday': 'Upper Body', 'Tuesday': 'Rest', 'Wednesday': 'Lower Body', 'Thursday': 'Rest', 'Friday': 'Full Body', 'Saturday': 'Core', 'Sunday': 'Rest' };

        const exerciseData = {
            upper: {
                Beginner: [{name: 'Wall Pushups', steps: 'Hands against wall, lower chest slowly, push back.'}, {name: 'Arm Circles', steps: 'Extend arms, rotate in small circles for 30s.'}],
                Pro: [{name: 'Pushups', steps: 'Lower chest to floor, keep core tight.'}, {name: 'Plank Shoulder Taps', steps: 'In plank, tap opposite shoulder with hand.'}],
                Advanced: [{name: 'Diamond Pushups', steps: 'Hands in diamond shape, lower chest to hands.'}, {name: 'Handstand Pushups', steps: 'Advanced inversion work against wall.'}]
            },
            lower: {
                Beginner: [{name: 'Chair Squats', steps: 'Lower hips until you touch a chair, then stand.'}, {name: 'Step-ups', steps: 'Step onto a sturdy box or stair, then back down.'}],
                Pro: [{name: 'Standard Squats', steps: 'Hips back, thighs parallel to floor.'}, {name: 'Walking Lunges', steps: 'Step forward and drop back knee.'}],
                Advanced: [{name: 'Jump Squats', steps: 'Explosive squat, landing softly.'}, {name: 'Single Leg Squats', steps: 'Keep one leg out, lower with one leg.'}]
            }
        };

        window.onload = function() { updateUI(); renderWeeklyBoard(); setDailyRecommendation(); updateGamification(); if(profile.darkMode) document.body.classList.add('dark'); };

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('hidden');
            document.getElementById('view-goals').classList.toggle('hidden');
        }

        function toggleDarkMode() {
            profile.darkMode = !profile.darkMode;
            document.body.classList.toggle('dark');
            localStorage.setItem('strive_profile', JSON.stringify(profile));
        }

        function changeAvatar(color, icon) {
            profile.avatarColor = color; profile.avatarIcon = icon;
            updateAvatarUI();
            localStorage.setItem('strive_profile', JSON.stringify(profile));
        }

        function updateAvatarUI() {
            document.getElementById('main-avatar').style.backgroundColor = profile.avatarColor;
            document.getElementById('avatar-icon').className = `fas ${profile.avatarIcon} text-3xl text-white`;
        }

        function switchTab(tab) {
            ['daily', 'plan', 'goals'].forEach(t => document.getElementById('view-' + t).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['tab-daily', 'tab-plan', 'tab-goals'].forEach(b => document.getElementById(b).className = "flex-1 py-2.5 text-[10px] font-bold uppercase text-slate-400");
            document.getElementById('tab-' + tab).className = "flex-1 py-2.5 text-[10px] font-bold uppercase active-tab";
            document.getElementById('settings-panel').classList.add('hidden');
        }

        function updateUI() {
            const bmi = (703 * (profile.weight / (profile.height * profile.height))).toFixed(1);
            document.getElementById('stat-bmi').innerText = isNaN(bmi) ? "--" : bmi;
            document.getElementById('stat-workouts').innerText = history.length;
            document.getElementById('v-level').value = profile.level;
            updateAvatarUI();
        }

        function generateIntelligentWorkout() {
            document.getElementById('workout-menu').classList.add('hidden');
            document.getElementById('active-workout').classList.remove('hidden');
            const today = days[(new Date().getDay() + 6) % 7];
            const mode = schedule[today].split(' ')[0].toLowerCase();
            const level = profile.level;
            
            let baseSets = level === 'Advanced' ? 5 : (level === 'Pro' ? 4 : 3);
            const list = exerciseData[mode] ? exerciseData[mode][level] : exerciseData['upper'][level];
            
            document.getElementById('exercise-list').innerHTML = list.map(ex => `
                <div class="p-4 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl">
                    <div class="flex justify-between items-center"><span class="font-bold uppercase text-[10px]">${ex.name}</span><span class="text-[9px] font-bold text-blue-600">${baseSets} Sets</span></div>
                    ${level === 'Beginner' ? `<div class="tutorial-box"><i class="fas fa-info-circle"></i> ${ex.steps}</div>` : ''}
                </div>`).join('');
        }

        function toggleDay(day) {
            let nextIndex = (types.indexOf(schedule[day]) + 1) % types.length;
            schedule[day] = types[nextIndex];
            localStorage.setItem('strive_schedule', JSON.stringify(schedule));
            renderWeeklyBoard(); setDailyRecommendation();
        }

        function renderWeeklyBoard() {
            const today = days[(new Date().getDay() + 6) % 7];
            document.getElementById('weekly-board').innerHTML = days.map(day => `
                <div onclick="toggleDay('${day}')" class="flex justify-between p-4 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl ${day === today ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : ''}">
                    <span class="text-[10px] font-bold uppercase ${day === today ? 'text-blue-600' : 'text-slate-400'}">${day}</span>
                    <span class="text-[10px] font-bold uppercase">${schedule[day]}</span>
                </div>`).join('');
        }

        function setDailyRecommendation() {
            const today = days[(new Date().getDay() + 6) % 7];
            const plan = schedule[today];
            document.getElementById('rec-text').innerText = plan === 'Rest' ? "Rest Mode" : plan;
        }

        function updateProfile() {
            profile.level = document.getElementById('v-level').value;
            localStorage.setItem('strive_profile', JSON.stringify(profile));
            updateUI();
        }

        function updateGamification() {
            const progress = Math.min((history.length % 5) * 20, 100);
            document.getElementById('progress-fill').style.width = (progress || 5) + '%';
            document.getElementById('progress-text').innerText = progress + '%';
        }

        function logSession() { history.push({ date: new Date().toLocaleDateString() }); localStorage.setItem('strive_history', JSON.stringify(history)); location.reload(); }
    </script>
</body>
</html>
